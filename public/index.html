<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unusual Options Activity — GLD & SLV</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --green: #22c55e;
    --green-dim: #16a34a;
    --green-bg: rgba(34,197,94,0.08);
    --red: #ef4444;
    --red-dim: #dc2626;
    --red-bg: rgba(239,68,68,0.08);
    --gold: #f59e0b;
    --silver: #a1a1aa;
    --accent: #6366f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header h1 span.gold { color: var(--gold); }
  header h1 span.silver { color: var(--silver); }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: background 0.2s;
  }
  #refresh-btn:hover { background: var(--accent); }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .period-selector {
    display: flex;
    gap: 8px;
  }
  .period-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .period-btn:hover { border-color: var(--accent); color: var(--text); }
  .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }

  /* Heatmap section */
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    font-size: 11px;
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .heatmap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .heatmap-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .heatmap-card.gld::before { background: var(--gold); }
  .heatmap-card.slv::before { background: var(--silver); }

  .heatmap-card h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .heatmap-card h3 .ticker-gld { color: var(--gold); }
  .heatmap-card h3 .ticker-slv { color: var(--silver); }

  .heatmap-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .heatmap-row:last-child { border-bottom: none; }
  .heatmap-row .label { color: var(--text-dim); }

  .bar-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    height: 28px;
  }
  .bar-label { font-size: 11px; width: 40px; text-align: right; color: var(--text-dim); }
  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .bar-fill.call { background: var(--green); opacity: 0.7; }
  .bar-fill.put { background: var(--red); opacity: 0.7; }

  /* Expiration heatmap */
  .exp-heatmap {
    margin-bottom: 32px;
  }
  .exp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .exp-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    transition: transform 0.2s;
    cursor: default;
  }
  .exp-cell:hover { transform: translateY(-2px); }
  .exp-cell .exp-date { font-weight: 600; margin-bottom: 4px; }
  .exp-cell .exp-ticker { font-size: 10px; color: var(--text-dim); }
  .exp-cell .exp-vol { font-size: 11px; margin-top: 4px; }
  .exp-cell .exp-unusual {
    display: inline-block;
    margin-top: 4px;
    font-size: 10px;
    background: rgba(99,102,241,0.2);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .heat-0 { border-color: var(--border); }
  .heat-1 { border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.03); }
  .heat-2 { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.06); }
  .heat-3 { border-color: rgba(99,102,241,0.7); background: rgba(99,102,241,0.1); }
  .heat-4 { border-color: var(--accent); background: rgba(99,102,241,0.15); }

  /* Notable trades table */
  .table-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--text); }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sort-btn .arrow { margin-left: 4px; font-size: 10px; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--text); }

  .table-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td {
    padding: 10px 14px;
    white-space: nowrap;
  }

  .call-row { background: var(--green-bg); }
  .put-row { background: var(--red-bg); }

  .badge-call {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }
  .badge-put {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }
  .badge-unusual {
    background: rgba(245,158,11,0.15);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }

  .premium-val { font-weight: 700; }
  .ratio-hot { color: var(--gold); font-weight: 600; }

  .ticker-gld { color: var(--gold); font-weight: 700; }
  .ticker-slv { color: var(--silver); font-weight: 700; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,14,23,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-dim); font-size: 14px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state p { margin-top: 8px; font-size: 14px; }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 12px; }
    header { flex-direction: column; gap: 12px; align-items: flex-start; }
    header h1 { font-size: 18px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Scanning options chains for GLD & SLV...</div>
</div>

<div class="container">
  <header>
    <h1>Unusual Options Activity &mdash; <span class="gold">GLD</span> & <span class="silver">SLV</span></h1>
    <div class="header-meta">
      <div class="period-selector">
        <button class="period-btn active" data-period="1" onclick="setPeriod(1)">1D</button>
        <button class="period-btn" data-period="7" onclick="setPeriod(7)">7D</button>
        <button class="period-btn" data-period="30" onclick="setPeriod(30)">30D</button>
      </div>
      <span id="timestamp">Loading...</span>
      <button id="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </header>

  <!-- Summary Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Ticker Heatmap -->
  <div class="section-title">Activity Heatmap <span class="badge">by ticker</span></div>
  <div class="heatmap-grid" id="heatmap-grid"></div>

  <!-- Expiration Heatmap -->
  <div class="exp-heatmap">
    <div class="section-title">Expiration Heatmap <span class="badge">unusual activity concentration</span></div>
    <div class="exp-grid" id="exp-grid"></div>
  </div>

  <!-- Notable Trades Feed -->
  <div class="section-title">Notable Trades <span class="badge" id="notable-count">0</span></div>

  <div class="table-controls">
    <span style="font-size:12px;color:var(--text-dim)">Sort:</span>
    <button class="sort-btn active" data-sort="premium" onclick="setSort('premium')">Premium <span class="arrow">▼</span></button>
    <button class="sort-btn" data-sort="expiration" onclick="setSort('expiration')">Expiration <span class="arrow">▼</span></button>
    <button class="sort-btn" data-sort="ticker" onclick="setSort('ticker')">Ticker <span class="arrow">▼</span></button>
    <button class="sort-btn" data-sort="volume" onclick="setSort('volume')">Volume <span class="arrow">▼</span></button>
    <button class="sort-btn" data-sort="ratio" onclick="setSort('ratio')">Vol/OI <span class="arrow">▼</span></button>

    <span style="margin-left:16px;font-size:12px;color:var(--text-dim)">Filter:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="call" onclick="setFilter('call')">Calls</button>
    <button class="filter-btn" data-filter="put" onclick="setFilter('put')">Puts</button>
    <button class="filter-btn" data-filter="GLD" onclick="setFilter('GLD')">GLD</button>
    <button class="filter-btn" data-filter="SLV" onclick="setFilter('SLV')">SLV</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th onclick="setSort('ticker')">Ticker</th>
          <th onclick="setSort('type')">Type</th>
          <th onclick="setSort('strike')">Strike</th>
          <th onclick="setSort('expiration')">Expiration</th>
          <th onclick="setSort('lastPrice')">Last</th>
          <th onclick="setSort('bid')">Bid</th>
          <th onclick="setSort('ask')">Ask</th>
          <th onclick="setSort('volume')">Volume</th>
          <th onclick="setSort('oi')">Open Int</th>
          <th onclick="setSort('ratio')">Vol/OI</th>
          <th onclick="setSort('iv')">IV</th>
          <th onclick="setSort('premium')">Premium</th>
          <th>Moneyness</th>
        </tr>
      </thead>
      <tbody id="trades-body"></tbody>
    </table>
  </div>
</div>

<script>
let allData = null;
let currentSort = 'premium';
let sortAsc = false;
let currentFilter = 'all';
let currentPeriod = 1;

function fmt(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function fmtNum(n) {
  return n.toLocaleString();
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  loading.style.display = 'flex';

  try {
    const res = await fetch(`/api/options?period=${currentPeriod}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();
    renderAll();
  } catch (e) {
    console.error('Failed to load data:', e);
    document.getElementById('stats-bar').innerHTML =
      '<div class="stat-card" style="grid-column:1/-1;text-align:center"><div class="label">Error</div><div class="value red">Failed to load data — check server</div></div>';
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

function renderAll() {
  if (!allData) return;
  renderStats();
  renderHeatmap();
  renderExpHeatmap();
  renderTable();
}

function renderStats() {
  const s = allData.summary;
  const h = allData.heatmap.by_ticker;

  let totalCallVol = 0, totalPutVol = 0, totalCallPrem = 0, totalPutPrem = 0;
  for (const t of Object.values(h)) {
    totalCallVol += t.calls.volume;
    totalPutVol += t.puts.volume;
    totalCallPrem += t.calls.premium;
    totalPutPrem += t.puts.premium;
  }

  const pcRatio = totalCallVol > 0 ? (totalPutVol / totalCallVol).toFixed(2) : 'N/A';

  document.getElementById('timestamp').textContent = s.timestamp;
  const periodText = s.period_days === 1 ? 'Today' : `Last ${s.period_days} days`;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="label">Period</div>
      <div class="value" style="color:var(--accent)">${periodText}</div>
    </div>
    <div class="stat-card">
      <div class="label">Contracts Scanned</div>
      <div class="value">${fmtNum(s.total_contracts_scanned)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Unusual Alerts</div>
      <div class="value" style="color:var(--gold)">${s.unusual_count}</div>
    </div>
    <div class="stat-card">
      <div class="label">Call Premium</div>
      <div class="value green">${fmt(totalCallPrem)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Put Premium</div>
      <div class="value red">${fmt(totalPutPrem)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Put/Call Ratio</div>
      <div class="value">${pcRatio}</div>
    </div>
  `;
}

function renderHeatmap() {
  const h = allData.heatmap.by_ticker;
  let html = '';

  for (const [ticker, data] of Object.entries(h)) {
    const totalVol = data.calls.volume + data.puts.volume;
    const callPct = totalVol > 0 ? (data.calls.volume / totalVol * 100) : 50;
    const putPct = totalVol > 0 ? (data.puts.volume / totalVol * 100) : 50;
    const cls = ticker.toLowerCase();

    html += `
      <div class="heatmap-card ${cls}">
        <h3><span class="ticker-${cls}">${ticker}</span> Options Flow</h3>
        <div class="heatmap-row">
          <span class="label">Total Volume</span>
          <span>${fmtNum(totalVol)}</span>
        </div>
        <div class="heatmap-row">
          <span class="label">Call Volume</span>
          <span style="color:var(--green)">${fmtNum(data.calls.volume)}</span>
        </div>
        <div class="heatmap-row">
          <span class="label">Put Volume</span>
          <span style="color:var(--red)">${fmtNum(data.puts.volume)}</span>
        </div>
        <div class="heatmap-row">
          <span class="label">Call Premium</span>
          <span style="color:var(--green)">${fmt(data.calls.premium)}</span>
        </div>
        <div class="heatmap-row">
          <span class="label">Put Premium</span>
          <span style="color:var(--red)">${fmt(data.puts.premium)}</span>
        </div>
        <div class="heatmap-row">
          <span class="label">Unusual Flags</span>
          <span style="color:var(--gold)">${data.unusual_count}</span>
        </div>
        <div class="bar-container">
          <span class="bar-label" style="color:var(--green)">Calls</span>
          <div class="bar-track">
            <div class="bar-fill call" style="width:${callPct}%"></div>
          </div>
        </div>
        <div class="bar-container">
          <span class="bar-label" style="color:var(--red)">Puts</span>
          <div class="bar-track">
            <div class="bar-fill put" style="width:${putPct}%"></div>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById('heatmap-grid').innerHTML = html;
}

function renderExpHeatmap() {
  const exps = allData.heatmap.by_expiration;
  if (!exps || exps.length === 0) {
    document.getElementById('exp-grid').innerHTML = '<div class="empty-state"><p>No expiration data</p></div>';
    return;
  }

  const maxUnusual = Math.max(...exps.map(e => e.unusual_count), 1);
  let html = '';

  for (const exp of exps.slice(0, 30)) {
    const heatLevel = Math.min(4, Math.ceil((exp.unusual_count / maxUnusual) * 4));
    const totalVol = exp.call_volume + exp.put_volume;
    const tickerCls = exp.ticker.toLowerCase();

    html += `
      <div class="exp-cell heat-${heatLevel}">
        <div class="exp-ticker"><span class="ticker-${tickerCls}">${exp.ticker}</span></div>
        <div class="exp-date">${exp.expiration}</div>
        <div class="exp-vol">${fmtNum(totalVol)} vol</div>
        ${exp.unusual_count > 0 ? `<div class="exp-unusual">${exp.unusual_count} unusual</div>` : ''}
      </div>
    `;
  }

  document.getElementById('exp-grid').innerHTML = html;
}

function getFilteredData() {
  let trades = allData.notable;
  if (currentFilter === 'call') trades = trades.filter(t => t.type === 'call');
  else if (currentFilter === 'put') trades = trades.filter(t => t.type === 'put');
  else if (currentFilter === 'GLD') trades = trades.filter(t => t.ticker === 'GLD');
  else if (currentFilter === 'SLV') trades = trades.filter(t => t.ticker === 'SLV');
  return trades;
}

function getSortedData(trades) {
  const dir = sortAsc ? 1 : -1;
  return [...trades].sort((a, b) => {
    switch (currentSort) {
      case 'premium': return dir * (a.premium - b.premium);
      case 'expiration': return dir * (a.expiration.localeCompare(b.expiration));
      case 'ticker': return dir * (a.ticker.localeCompare(b.ticker));
      case 'volume': return dir * (a.volume - b.volume);
      case 'ratio': return dir * (a.volumeOiRatio - b.volumeOiRatio);
      case 'strike': return dir * (a.strike - b.strike);
      case 'lastPrice': return dir * (a.lastPrice - b.lastPrice);
      case 'bid': return dir * (a.bid - b.bid);
      case 'ask': return dir * (a.ask - b.ask);
      case 'oi': return dir * (a.openInterest - b.openInterest);
      case 'iv': return dir * (a.iv - b.iv);
      case 'type': return dir * (a.type.localeCompare(b.type));
      default: return 0;
    }
  });
}

function renderTable() {
  const trades = getSortedData(getFilteredData());
  document.getElementById('notable-count').textContent = trades.length;

  if (trades.length === 0) {
    document.getElementById('trades-body').innerHTML =
      '<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text-dim)">No unusual options activity found matching filters</td></tr>';
    return;
  }

  let html = '';
  for (const t of trades) {
    const rowCls = t.type === 'call' ? 'call-row' : 'put-row';
    const badgeCls = t.type === 'call' ? 'badge-call' : 'badge-put';
    const tickerCls = t.ticker === 'GLD' ? 'ticker-gld' : 'ticker-slv';

    html += `<tr class="${rowCls}">
      <td><span class="${tickerCls}">${t.ticker}</span></td>
      <td><span class="${badgeCls}">${t.type.toUpperCase()}</span></td>
      <td>$${t.strike.toFixed(2)}</td>
      <td>${t.expiration}</td>
      <td>$${t.lastPrice.toFixed(2)}</td>
      <td>$${t.bid.toFixed(2)}</td>
      <td>$${t.ask.toFixed(2)}</td>
      <td>${fmtNum(t.volume)}</td>
      <td>${fmtNum(t.openInterest)}</td>
      <td class="ratio-hot">${t.volumeOiRatio}x</td>
      <td>${t.iv}%</td>
      <td class="premium-val">${fmt(t.premium)}</td>
      <td>${t.moneyness}</td>
    </tr>`;
  }

  document.getElementById('trades-body').innerHTML = html;
}

function setSort(field) {
  if (currentSort === field) {
    sortAsc = !sortAsc;
  } else {
    currentSort = field;
    sortAsc = false;
  }

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === field);
    if (btn.dataset.sort === field) {
      btn.querySelector('.arrow').textContent = sortAsc ? '▲' : '▼';
    }
  });

  renderTable();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  renderTable();
}

function setPeriod(days) {
  currentPeriod = days;
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.period) === days);
  });
  loadData();
}

// Load on page ready
loadData();
</script>
</body>
</html>
